name: Build Desktop

on:
  push:
    branches: [ "master" ]
    tags: [ "*RELEASE" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: build/libs/*.jar

  build-desktop:
    needs: build-backend
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: build/libs

      # Generazione JRE Custom con jlink
      - name: Generate Custom JRE
        shell: bash
        run: |
          jlink \
          --add-modules java.base,java.desktop,java.instrument,java.logging,java.management,java.naming,java.net.http,java.prefs,java.rmi,java.scripting,java.security.jgss,java.sql,java.xml,jdk.unsupported,jdk.crypto.ec,jdk.localedata \
          --compress=2 \
          --no-header-files \
          --no-man-pages \
          --strip-debug \
          --output desktop/jre

      - name: Install Dependencies
        working-directory: ./desktop
        shell: bash
        run: rm -rf node_modules package-lock.json && npm install

      - name: Build & Package Electron App
        working-directory: ./desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx vite build && npx electron-builder

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app-${{ matrix.os }}
          path: |
            desktop/dist-electron/*.AppImage
            desktop/dist-electron/*.exe
            desktop/dist-electron/*.zip
            desktop/dist-electron/*.dmg

  # Crea archivio sorgenti scaricabile come artifact
  source-archive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Source Archive
        run: |
          VERSION="${GITHUB_REF_NAME}"
          git archive --format=zip --prefix="LibrePM-${VERSION}/" HEAD -o "LibrePM-${VERSION}-source.zip"
          git archive --format=tar.gz --prefix="LibrePM-${VERSION}/" HEAD -o "LibrePM-${VERSION}-source.tar.gz"

      - name: Upload Source Archives
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: |
            LibrePM-*-source.zip
            LibrePM-*-source.tar.gz

  # Crea una GitHub Release quando si pusha un tag *RELEASE
  release:
    if: endsWith(github.ref, 'RELEASE')
    needs: [build-desktop, source-archive]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp artifacts/source-code/* release-files/ || true
          cp artifacts/desktop-app-ubuntu-latest/* release-files/ || true
          cp artifacts/desktop-app-windows-latest/* release-files/ || true
          cp artifacts/desktop-app-macos-latest/* release-files/ || true
          cp artifacts/backend-jar/* release-files/ || true
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-files/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}